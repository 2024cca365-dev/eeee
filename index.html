<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>로또 번호 추첨기</h1>
        <div class="theme-switch-wrapper">
            <label class="theme-switch" for="theme-toggle">
                <input type="checkbox" id="theme-toggle" />
                <span class="slider round"></span>
            </label>
        </div>
        <div class="lotto-numbers" id="lotto-numbers"></div>
        <button id="generate-btn">번호 생성</button>

        <hr style="margin-top: 40px; margin-bottom: 30px; border-color: var(--text-color); opacity: 0.2;">

        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/xdalarqz" method="POST" class="contact-form">
            <div class="form-group">
                <label for="name">이름:</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="email">이메일:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="company">회사명 (선택 사항):</label>
                <input type="text" id="company" name="company">
            </div>
            <div class="form-group">
                <label for="message">메시지:</label>
                <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit" id="submit-form-btn">문의하기</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
