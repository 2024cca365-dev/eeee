     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-4386144437468156">
</head>
<body>
    <header>
        <div class="header-container">
            <a href="index.html" class="logo">로또 번호 추첨기</a>
            <nav>
                <ul>
                    <li><a href="index.html">홈</a></li>
                    <li><a href="fortune.html">오늘의 운세</a></li>
                    <li><a href="history.html">로또 역사</a></li>
                    <li><a href="stats.html">통계/시뮬레이션</a></li>
                    <li><a href="about.html">소개</a></li>
                    <li><a href="how-to-use.html">사용법</a></li>
                    <li><a href="contact.html">문의</a></li>
                </ul>
            </nav>
            <div class="theme-switch-wrapper">
                <label class="theme-switch" for="theme-toggle">
                    <input type="checkbox" id="theme-toggle" />
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
    </header>

    <main>
        <div class="content-page">
            <h1>문의하기</h1>
            <p>서비스에 대한 질문, 파트너십 제안, 또는 기타 의견이 있으시면 아래 양식을 통해 언제든지 문의해주세요. 저희는 사용자의 목소리에 귀 기울이고 있습니다.</p>

            <form action="https://formspree.io/f/xdalarqz" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">이름:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="company">회사명 (선택 사항):</label>
                    <input type="text" id="company" name="company">
                </div>
                <div class="form-group">
                    <label for="message">메시지:</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" id="submit-form-btn">문의 보내기</button>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2026 로또 번호 추첨기. All Rights Reserved.</p>

        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
